<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NossaTV — Transmissão</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --accent: #3b82f6;
            --bg: #07090e;
            --panel-bg: rgba(18, 22, 33, 0.96);
            --text: #ffffff;
            --text-secondary: #8a8d9a;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── TOP BAR (VDO.Ninja Style) ─────────────────────────────── */
        #top-bar {
            position: relative;
            background: #000000;
            padding: env(safe-area-inset-top, 10px) 14px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }
        #top-left {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        #top-title {
            font-size: 15px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.3px;
        }
        #top-room-info {
            font-size: 10px;
            color: var(--text-secondary);
        }
        #top-right-stats {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: #e2e8f0;
        }
        .stat-group {
            display: flex;
            align-items: center;
            gap: 3px;
            opacity: 0.9;
        }
        .stat-group svg {
            color: #a0aec0;
        }
        .kbps-indicator {
            display: flex;
            align-items: center;
            gap: 3px;
            color: var(--green);
            font-weight: 700;
            font-size: 10px;
        }
        .kbps-arrow {
            font-size: 9px;
            animation: pulse-arrow 1.5s infinite;
        }
        @keyframes pulse-arrow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ── VIDEOS AREA ──────────────────────────── */
        #videos-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: #000000;
        }

        /* local camera (top) */
        #local-wrap {
            flex: 1;
            position: relative;
            background: #06070a;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #local-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        #local-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #050609;
            z-index: 2;
        }
        #local-placeholder .ph-icon {
            font-size: 32px;
            opacity: 0.4;
        }
        #local-placeholder .ph-text {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            font-weight: 500;
        }
        #local-placeholder.hide { display: none; }

        /* LIVE badge */
        #live-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--red);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1.5px;
            padding: 3px 8px;
            border-radius: 4px;
            display: none;
            z-index: 10;
            animation: blink-live 2s infinite;
        }
        #live-badge.show { display: block; }
        @keyframes blink-live { 0%,100%{opacity:1} 50%{opacity:.65} }

        /* return video (bottom) */
        #return-wrap {
            flex: 1;
            position: relative;
            background: #06070a;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #return-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #050609;
            z-index: 2;
        }
        #return-placeholder .ph-icon {
            font-size: 32px;
            opacity: 0.3;
        }
        #return-placeholder .ph-text {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            font-weight: 500;
        }
        #return-placeholder.hide { display: none; }
        #return-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
            object-fit: contain;
        }
        #return-video.active { display: block; }

        /* landscape: camera left, program right */
        @media (orientation: landscape) {
            #videos-area { flex-direction: row; }
            #local-wrap { border-bottom: none; border-right: 1px solid rgba(255,255,255,0.04); }
        }

        /* VU METER overlay */
        #vu-bar {
            position: absolute;
            bottom: 6px;
            left: 12px;
            right: 12px;
            z-index: 10;
            display: none;
        }
        #vu-bar.show { display: block; }
        #vu-track {
            width: 100%;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.12);
            overflow: hidden;
        }
        #vu-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.06s linear;
            background: linear-gradient(90deg, #22c55e 0%, #f59e0b 75%, #ef4444 100%);
        }

        /* ── CONTROL BAR CONTAINER (Floating & Center) ─── */
        #ctrl-bar-container {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 16px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            pointer-events: none;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 16px;
        }
        #ctrl-bar {
            pointer-events: auto;
            background: rgba(24, 25, 28, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Buttons matching VDO.Ninja (Rounded Squares) */
        .ctrl-btn {
            width: 44px;
            height: 38px;
            border-radius: 8px;
            background: #202124;
            border: none;
            cursor: pointer;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active {
            background: #2f3035;
        }
        .ctrl-btn.mic-active {
            color: var(--green);
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .ctrl-btn.mic-active:active {
            background: rgba(34, 197, 94, 0.25);
        }
        .ctrl-btn.muted {
            color: var(--red);
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .ctrl-btn.muted:active {
            background: rgba(239, 68, 68, 0.25);
        }
        .ctrl-btn.hangup {
            background: #d93025;
            color: #ffffff;
        }
        .ctrl-btn.hangup:active {
            background: #b2271d;
        }

        /* ── FLOATING VOLUME PANEL (drag & drop) ──── */
        .vol-panel {
            position: fixed;
            top: 80px;
            left: 16px;
            width: 220px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 0;
            border-radius: 16px;
            z-index: 200;
            display: none;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        .vol-panel.open { display: flex; }
        .vol-panel.dragging { transition: none; }

        .vol-panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: grab;
            user-select: none;
        }
        .vol-panel-header:active { cursor: grabbing; }
        .vol-panel-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            flex: 1;
        }
        .vol-panel-close {
            width: 24px; height: 24px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .vol-panel-close:hover { background: var(--red); color: #fff; border-color: var(--red); }

        .vol-panel-body {
            padding: 14px 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .vol-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .vol-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
        .vol-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.15);
            outline: none;
            cursor: pointer;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .vol-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
        }
        .vol-pct {
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            min-width: 32px;
            text-align: right;
        }
        .vol-divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 2px 0;
        }
        .vol-label {
            flex: 1;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .vol-toggle {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .vol-toggle.active {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.4);
            color: #22c55e;
        }
        .vol-toggle:active { opacity: 0.7; }

        /* ── START SCREEN OVERLAY ─────────────────── */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,6,10,0.96);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            padding: 32px;
        }
        #start-overlay.hide { display: none; }
        .start-logo {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
        }
        .start-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .start-slot {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #start-btn {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.4);
            font-family: inherit;
            transition: opacity 0.2s, transform 0.1s;
        }
        #start-btn:active { transform: scale(0.97); }
        #start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #start-info {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.5;
            max-width: 280px;
        }
        #start-info.error { color: var(--red); }

        /* Spinner for loading */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── TOAST CONTAINER ────────────────────────── */
        #toast-container {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: rgba(18, 22, 33, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }
        @keyframes toast-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="app">

    <!-- TOP BAR (VDO.Ninja Style) -->
    <div id="top-bar">
        <div id="top-left">
            <div id="top-title">VDO.Ninja</div>
            <div id="top-room-info">You are in room: nossatv</div>
        </div>
        <div id="top-right-stats">
            <!-- Link -->
            <div class="stat-group" title="Conexões">
                <svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                <span id="top-stat-links">0</span>
            </div>
            <!-- Headphones (Audio Out) -->
            <div class="stat-group" title="Escutando">
                <svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
                <span id="top-stat-ears">0</span>
            </div>
            <!-- Viewers (Eye) -->
            <div class="stat-group" title="Visualizadores">
                <svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <span id="top-stat-eyes">0</span>
            </div>
            <!-- Director (Clapperboard) -->
            <div class="stat-group" title="Diretor">
                <svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2" ry="2"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                <span>0</span>
            </div>
            <!-- Quality (triangle + kbps) -->
            <div class="kbps-indicator" id="kbps-indicator" style="display: none;">
                <span class="kbps-arrow">▲</span>
                <span id="top-kbps-text">-- kbps</span>
            </div>
        </div>
    </div>

    <!-- VIDEOS AREA -->
    <div id="videos-area">

        <!-- local camera (top half) -->
        <div id="local-wrap">
            <video id="local-video" autoplay playsinline muted></video>
            <div id="local-placeholder">
                <div class="ph-icon">📷</div>
                <div class="ph-text">Câmera inativa</div>
            </div>
            <div id="live-badge">AO VIVO</div>

            <!-- VU Meter overlay -->
            <div id="vu-bar">
                <div id="vu-track">
                    <div id="vu-fill"></div>
                </div>
            </div>
        </div>

        <!-- return video (bottom half) — VDO.Ninja via SDK view() -->
        <div id="return-wrap">
            <video id="return-video" autoplay playsinline muted></video>
            <div id="return-placeholder">
                <div class="ph-icon">📺</div>
                <div class="ph-text">Aguardando retorno do programa...</div>
            </div>
        </div>

    </div>

    <!-- FLOATING AUDIO CONTROL PANEL (drag & drop) -->
    <div class="vol-panel" id="settings-panel">
        <div class="vol-panel-header" id="vol-panel-header">
            <span class="vol-panel-title">🎛️ Controles de Áudio</span>
            <button class="vol-panel-close" id="close-settings-btn">✕</button>
        </div>
        <div class="vol-panel-body">
            <div class="vol-row">
                <span class="vol-icon">🎙️</span>
                <input type="range" class="vol-slider" id="vol-input" min="0" max="200" value="100" step="5">
                <span class="vol-pct" id="vol-input-pct">100%</span>
            </div>
            <div class="vol-row">
                <span class="vol-icon">🔊</span>
                <input type="range" class="vol-slider" id="vol-output" min="0" max="100" value="100" step="5">
                <span class="vol-pct" id="vol-output-pct">100%</span>
            </div>
            <div class="vol-divider"></div>
            <div class="vol-row">
                <span class="vol-icon">🔇</span>
                <span class="vol-label">Anti-eco</span>
                <button class="vol-toggle active" id="toggle-echo" title="Cancelamento de eco">Ligado</button>
            </div>
            <div class="vol-row">
                <span class="vol-icon">🔇</span>
                <span class="vol-label">Microfonia</span>
                <button class="vol-toggle active" id="toggle-noise" title="Supressão de ruído">Ligado</button>
            </div>
            <div class="vol-row">
                <span class="vol-icon">🔇</span>
                <span class="vol-label">Auto Gain</span>
                <button class="vol-toggle active" id="toggle-gain" title="Controle automático de ganho">Ligado</button>
            </div>
        </div>
    </div>

    <!-- FLOATING CONTROL BAR CONTAINER -->
    <div id="ctrl-bar-container">
        <div id="ctrl-bar">
            <!-- 1. Chat Button -->
            <button class="ctrl-btn" id="btn-chat" title="Chat">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </button>

            <!-- 2. Speaker Button -->
            <button class="ctrl-btn" id="btn-speaker" title="Mutar/Ativar retorno">
                <svg id="svg-speaker-on" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <svg id="svg-speaker-muted" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
            </button>

            <!-- 3. Microphone Button -->
            <button class="ctrl-btn mic-active" id="btn-mic" title="Mutar Microfone">

                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(135deg);"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>

<!-- OVERLAY DE INÍCIO -->
<div id="start-overlay">
    <div class="start-logo">📺</div>

    <div class="start-slot" id="start-slot-label">Slot: ---</div>
    <button id="start-btn" disabled>Iniciar Transmissão</button>
    <div id="start-info">Preparando...</div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script>
(function () {
    'use strict';

    // ─── CONFIG ──────────────────────────────────────────────────
    var ROOM = 'NossaTV';
    var RETURN_STREAM_ID = 'NossaTV_CAM';
    var SDK_URLS = [
        'https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@v1.3.18/vdoninja-sdk.min.js',
        'https://unpkg.com/@vdoninja/sdk@1.3.18/dist/vdoninja-sdk.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/vdo-ninja-sdk/1.3.18/vdoninja-sdk.min.js',
    ];
    var ICE = [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' },
    ];

    // ─── SLOT ────────────────────────────────────────────────────
    var slot = new URLSearchParams(location.search).get('slot');
    if (!slot) {
        document.getElementById('start-info').textContent = '❌ Link inválido. Solicite um novo link.';
        document.getElementById('start-info').className = 'error';
        return;
    }
    var streamID = 'slot_' + slot;
    document.getElementById('start-slot-label').textContent = 'Vereador: ' + slot;
    document.getElementById('top-room-info').textContent = 'You are in room: ' + ROOM.toLowerCase() + ' · ' + slot;
    document.title = 'NossaTV — ' + slot;

    // ─── STATE ───────────────────────────────────────────────────
    var vdo = null;
    var localStream = null;
    var connected = false;
    var micMuted = false;
    var cameraMuted = false;
    var speakerMuted = false;
    var facingMode = 'user';
    var audioEcho = true;
    var audioNoise = true;
    var audioGain = true;
    var vuInterval = null;
    var qualityInterval = null;
    var audioCtx = null;
    var inputGainNode = null;
    var kbpsInterval = null;
    var lastBytes = 0;

    // ─── DOM ─────────────────────────────────────────────────────
    var startOverlay  = document.getElementById('start-overlay');
    var startBtn      = document.getElementById('start-btn');
    var startInfo     = document.getElementById('start-info');
    var localVideo    = document.getElementById('local-video');
    var returnVideo  = document.getElementById('return-video');
    var localPh       = document.getElementById('local-placeholder');
    var returnPh      = document.getElementById('return-placeholder');
    var liveBadge     = document.getElementById('live-badge');
    var vuBar         = document.getElementById('vu-bar');
    var vuFill        = document.getElementById('vu-fill');
    var kbpsInd       = document.getElementById('kbps-indicator');
    var topKbpsText   = document.getElementById('top-kbps-text');
    var settingsPanel = document.getElementById('settings-panel');
    
    // Control Buttons
    var btnChat       = document.getElementById('btn-chat');
    var btnSpeaker    = document.getElementById('btn-speaker');
    var btnMic        = document.getElementById('btn-mic');
    var btnCamera     = document.getElementById('btn-camera');
    var btnFlip       = document.getElementById('btn-flip');
    var btnSettings   = document.getElementById('btn-settings');
    var btnHangup     = document.getElementById('btn-hangup');
    var btnCloseSet   = document.getElementById('close-settings-btn');
    var toggleEcho    = document.getElementById('toggle-echo');
    var toggleNoise   = document.getElementById('toggle-noise');
    var toggleGain    = document.getElementById('toggle-gain');
    
    // Sliders
    var volInput      = document.getElementById('vol-input');
    var volInputPct   = document.getElementById('vol-input-pct');
    var volOutput     = document.getElementById('vol-output');
    var volOutputPct  = document.getElementById('vol-output-pct');

    // SVGs
    var svgSpeakerOn  = document.getElementById('svg-speaker-on');
    var svgSpeakerMut = document.getElementById('svg-speaker-muted');
    var svgMicOn      = document.getElementById('svg-mic-on');
    var svgMicMut     = document.getElementById('svg-mic-muted');
    var svgCamOn      = document.getElementById('svg-cam-on');
    var svgCamMut     = document.getElementById('svg-cam-muted');

    // ─── TOAST ───────────────────────────────────────────────────
    function showToast(msg) {
        var container = document.getElementById('toast-container');
        var t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        container.appendChild(t);
        setTimeout(function() {
            t.style.opacity = '0';
            t.style.transition = 'opacity 0.3s';
            setTimeout(function() { t.remove(); }, 300);
        }, 2200);
    }

    // ─── FLOATING VOLUME PANEL (drag & drop) ──────────────────
    var volDragOffset = null;
    var volHeader = document.getElementById('vol-panel-header');

    function toggleVolPanel() {
        settingsPanel.classList.toggle('open');
    }
    btnSettings.addEventListener('click', function(e) { e.stopPropagation(); toggleVolPanel(); });
    btnCloseSet.addEventListener('click', function(e) { e.stopPropagation(); settingsPanel.classList.remove('open'); });
    settingsPanel.addEventListener('click', function(e) { e.stopPropagation(); });

    volHeader.addEventListener('mousedown', function(e) {
        if (e.target.closest('.vol-panel-close')) return;
        var rect = settingsPanel.getBoundingClientRect();
        volDragOffset = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        settingsPanel.classList.add('dragging');
        settingsPanel.style.right = 'auto';
        settingsPanel.style.bottom = 'auto';
        settingsPanel.style.left = rect.left + 'px';
        settingsPanel.style.top = rect.top + 'px';
        document.body.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', function(e) {
        if (!settingsPanel.classList.contains('dragging')) return;
        settingsPanel.style.left = (e.clientX - volDragOffset.x) + 'px';
        settingsPanel.style.top = (e.clientY - volDragOffset.y) + 'px';
    });

    document.addEventListener('mouseup', function() {
        if (!settingsPanel.classList.contains('dragging')) return;
        settingsPanel.classList.remove('dragging');
        document.body.style.cursor = '';
    });

    volInput.addEventListener('input', function() {
        var pct = parseInt(volInput.value);
        volInputPct.textContent = pct + '%';
        if (inputGainNode) inputGainNode.gain.value = pct / 100;
    });
    volOutput.addEventListener('input', function() {
        var pct = parseInt(volOutput.value);
        volOutputPct.textContent = pct + '%';
        if (returnGainNode) returnGainNode.gain.value = pct / 100;
    });

    // ─── AUDIO TOGGLES ────────────────────────────────────────────
    function restartAudio(constraints) {
        if (!localStream) return;
        var wasMicMuted = micMuted;
        var wasCamMuted = cameraMuted;
        var oldVideoTrack = localStream.getVideoTracks()[0];
        var oldTrack = localStream.getAudioTracks()[0];
        var oldSettings = oldTrack ? oldTrack.getSettings() : {};
        var videoConstraints = {
            deviceId: oldSettings.deviceId ? { exact: oldSettings.deviceId } : undefined,
            width: { ideal: 1280 }, height: { ideal: 720 }
        };
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            videoConstraints.facingMode = facingMode;
            delete videoConstraints.deviceId;
        }
        oldTrack && localStream.removeTrack(oldTrack);
        oldTrack && oldTrack.stop();
        navigator.mediaDevices.getUserMedia({
            video: false,
            audio: constraints
        }).then(function(newStream) {
            var newTrack = newStream.getAudioTracks()[0];
            if (newTrack) {
                localStream.addTrack(newTrack);
                if (wasMicMuted) newTrack.enabled = false;
            }
            if (vdo && vdo._pc) {
                var senders = vdo._pc.getSenders ? vdo._pc.getSenders() : [];
                senders.forEach(function(s) {
                    if (s.track && s.track.kind === 'audio') {
                        s.replaceTrack(newTrack).catch(function() {});
                    }
                });
            }
            stopVU();
            if (newTrack && !wasMicMuted) startVU(localStream);
        }).catch(function(e) {
            console.warn('[Guest] audio restart error:', e);
        });
    }

    toggleEcho.addEventListener('click', function() {
        audioEcho = !audioEcho;
        toggleEcho.textContent = audioEcho ? 'Ligado' : 'Desligado';
        toggleEcho.classList.toggle('active', audioEcho);
        restartAudio({ echoCancellation: audioEcho, noiseSuppression: audioNoise, autoGainControl: audioGain });
    });
    toggleNoise.addEventListener('click', function() {
        audioNoise = !audioNoise;
        toggleNoise.textContent = audioNoise ? 'Ligado' : 'Desligado';
        toggleNoise.classList.toggle('active', audioNoise);
        restartAudio({ echoCancellation: audioEcho, noiseSuppression: audioNoise, autoGainControl: audioGain });
    });
    toggleGain.addEventListener('click', function() {
        audioGain = !audioGain;
        toggleGain.textContent = audioGain ? 'Ligado' : 'Desligado';
        toggleGain.classList.toggle('active', audioGain);
        restartAudio({ echoCancellation: audioEcho, noiseSuppression: audioNoise, autoGainControl: audioGain });
    });

    // ─── CHAT BUTTON ─────────────────────────────────────────────
    btnChat.addEventListener('click', function() {
        showToast('Chat: Sem novas mensagens.');
    });

    // ─── SPEAKER BUTTON ──────────────────────────────────────────
    btnSpeaker.addEventListener('click', function() {
        speakerMuted = !speakerMuted;
        btnSpeaker.classList.toggle('muted', speakerMuted);
        svgSpeakerOn.style.display = speakerMuted ? 'none' : 'block';
        svgSpeakerMut.style.display = speakerMuted ? 'block' : 'none';
        if (returnVideo) returnVideo.muted = speakerMuted;
        showToast(speakerMuted ? '🔇 Retorno mutado' : '🔊 Retorno ativado');
        updateTopStats(connected);
    });

    // ─── MICROPHONE BUTTON ────────────────────────────────────────
    btnMic.addEventListener('click', function() {
        if (!localStream) return;
        micMuted = !micMuted;
        localStream.getAudioTracks().forEach(function(t) { t.enabled = !micMuted; });
        if (inputGainNode) {
            inputGainNode.gain.value = micMuted ? 0 : (parseInt(volInput.value) / 100);
        }
        btnMic.className = 'ctrl-btn ' + (micMuted ? 'muted' : 'mic-active');
        svgMicOn.style.display = micMuted ? 'none' : 'block';
        svgMicMut.style.display = micMuted ? 'block' : 'none';
        showToast(micMuted ? '🎙️ Microfone mutado' : '🎙️ Microfone ativo');
    });

    // ─── CAMERA BUTTON ────────────────────────────────────────────
    btnCamera.addEventListener('click', function() {
        if (!localStream) return;
        cameraMuted = !cameraMuted;
        localStream.getVideoTracks().forEach(function(t) { t.enabled = !cameraMuted; });
        btnCamera.classList.toggle('muted', cameraMuted);
        svgCamOn.style.display = cameraMuted ? 'none' : 'block';
        svgCamMut.style.display = cameraMuted ? 'block' : 'none';
        localVideo.classList.toggle('show', !cameraMuted);
        localPh.classList.toggle('hide', !cameraMuted);
        if (!cameraMuted) {
            var hv = window._localVideoEl;
            if (hv) hv.play().catch(function(){});
        }
        showToast(cameraMuted ? '📷 Câmera desativada' : '📷 Câmera ativa');
    });

    // ─── VIRAR CÂMERA ────────────────────────────────────────────
    btnFlip.addEventListener('click', function() {
        if (!localStream || !connected) return;
        facingMode = facingMode === 'user' ? 'environment' : 'user';
        switchCamera();
    });

    function switchCamera() {
        localStream.getVideoTracks().forEach(function(t) { t.stop(); });
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        }).then(function(newStream) {
            var newTrack = newStream.getVideoTracks()[0];
            localStream.getVideoTracks().forEach(function(t) { localStream.removeTrack(t); });
            localStream.addTrack(newTrack);
            var hv = window._localVideoEl;
            if (hv) {
                hv.srcObject = null;
                hv.srcObject = localStream;
                hv.play().catch(function(){});
            }
            var ctx = window._localCanvasCtx;
            window._localMirror = facingMode === 'user';
            
            if (vdo && vdo._pc) {
                var senders = vdo._pc.getSenders ? vdo._pc.getSenders() : [];
                senders.forEach(function(s) {
                    if (s.track && s.track.kind === 'video') {
                        s.replaceTrack(newTrack).catch(function() {});
                    }
                });
            }
            showToast('🔄 Câmera alternada');
        }).catch(function(e) { console.warn('[Guest] switchCamera error:', e); });
    }

    // ─── VU METER ────────────────────────────────────────────────
    function startVU(stream) {
        stopVU();
        if (!stream.getAudioTracks().length) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var src = audioCtx.createMediaStreamSource(stream);
            inputGainNode = audioCtx.createGain();
            inputGainNode.gain.value = parseInt(volInput.value) / 100;
            var analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            src.connect(inputGainNode);
            inputGainNode.connect(analyser);

            vuBar.classList.add('show');
            var data = new Uint8Array(analyser.frequencyBinCount);
            vuInterval = setInterval(function() {
                if (micMuted) {
                    vuFill.style.width = '0%';
                    return;
                }
                analyser.getByteTimeDomainData(data);
                var max = 0;
                for (var i = 0; i < data.length; i++) {
                    var v = Math.abs(data[i] - 128);
                    if (v > max) max = v;
                }
                var pct = (max / 128) * 100;
                vuFill.style.width = Math.min(pct, 100) + '%';
            }, 70);
        } catch(e) { console.warn('[Guest] VU error:', e); }
    }

    function stopVU() {
        clearInterval(vuInterval); vuInterval = null;
        if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; inputGainNode = null; }
        vuBar.classList.remove('show');
        vuFill.style.width = '0%';
    }



    // ─── TOP STATS ───────────────────────────────────────────────
    function updateTopStats(active) {
        document.getElementById('top-stat-links').textContent = active ? '1' : '0';
        document.getElementById('top-stat-ears').textContent = (active && !speakerMuted) ? '1' : '0';
        document.getElementById('top-stat-eyes').textContent = active ? '1' : '0';
    }

    // ─── kbps COUNTER ────────────────────────────────────────────
    function startKbps() {
        kbpsInd.style.display = 'flex';
        kbpsInterval = setInterval(function() {
            if (!vdo || !vdo._pc) return;
            vdo._pc.getStats(null).then(function(stats) {
                stats.forEach(function(r) {
                    if (r.type === 'outbound-rtp' && r.kind === 'video') {
                        var bytes = r.bytesSent || 0;
                        var kbps = Math.round(((bytes - lastBytes) * 8) / 1000);
                        lastBytes = bytes;
                        topKbpsText.textContent = (kbps > 0 ? kbps : '0') + '-kbps';
                    }
                });
            }).catch(function() {});
        }, 1000);
    }

    function stopKbps() {
        clearInterval(kbpsInterval); kbpsInterval = null;
        kbpsInd.style.display = 'none';
        lastBytes = 0;
    }

    var returnStream = null;
    var returnGainNode = null;

    // ─── VIEW RETURN ─────────────────────────────────────────────
    function startViewReturn() {
        if (!connected || !vdo) return;
        returnVideo.classList.add('active');
        returnPh.classList.add('hide');
        if (speakerMuted) returnVideo.muted = true;
        if (returnStream) {
            if (returnVideo.srcObject !== returnStream) returnVideo.srcObject = returnStream;
            returnVideo.play().catch(function(){});
            return;
        }
        vdo.view(RETURN_STREAM_ID, { audio: true, video: true }).catch(function(e) {
            console.warn('[Guest] Erro ao ver retorno:', e);
        });
    }

    function startReturnAudio(stream) {
        if (returnGainNode) {
            try { returnGainNode.disconnect(); } catch(e) {}
            returnGainNode = null;
        }
        var audioTracks = stream.getAudioTracks();
        if (audioTracks.length === 0) return;
        try {
            var ctx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            if (!audioCtx) audioCtx = ctx;
            var src = ctx.createMediaStreamSource(stream);
            returnGainNode = ctx.createGain();
            returnGainNode.gain.value = parseInt(volOutput.value) / 100;
            returnGainNode.connect(ctx.destination);
            src.connect(returnGainNode);
        } catch(e) {
            console.warn('[Guest] Erro audio retorno:', e);
        }
    }
    function getMedia() {
        var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        var videoC = { width: { ideal: 1280 }, height: { ideal: 720 } };
        if (isMobile) videoC.facingMode = facingMode;
        return navigator.mediaDevices.getUserMedia({
            video: videoC,
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        }).catch(function(err) {
            if (err.name === 'OverconstrainedError' || err.name === 'NotReadableError') {
                return navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: { echoCancellation: true, noiseSuppression: true }
                });
            }
            throw err;
        });
    }

    // ─── SDK LOAD ─────────────────────────────────────────────────
    var sdkPromise = null;
    function loadSDK() {
        if (sdkPromise) return sdkPromise;
        sdkPromise = new Promise(function(resolve, reject) {
            if (typeof VDONinjaSDK !== 'undefined') { resolve(); return; }
            var idx = 0;
            function tryLoad() {
                if (idx >= SDK_URLS.length) { reject(new Error('SDK indisponível')); return; }
                var s = document.createElement('script');
                s.src = SDK_URLS[idx++];
                s.crossOrigin = 'anonymous';
                s.onload = resolve;
                s.onerror = tryLoad;
                document.body.appendChild(s);
            }
            tryLoad();
        });
        return sdkPromise;
    }

    // ─── CLEANUP ──────────────────────────────────────────────────
    function cleanup() {
        stopVU(); stopKbps();
        if (returnGainNode) {
            try { returnGainNode.disconnect(); } catch(e) {}
            returnGainNode = null;
        }
        if (returnStream) {
            returnStream.getTracks().forEach(function(t) { t.stop(); });
            returnStream = null;
        }
        if (vdo) {
            try { vdo.stopPublishing(); } catch(e) {}
            try { vdo.stopViewing(RETURN_STREAM_ID); } catch(e) {}
        }
        if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
        var hv = window._localVideoEl;
        if (hv) { hv.srcObject = null; hv.pause(); hv.src = ''; }
        if (window._localRaf) { cancelAnimationFrame(window._localRaf); window._localRaf = null; }
        localPh.classList.remove('hide');
        localPh.classList.remove('hide');
        liveBadge.classList.remove('show');
        returnVideo.srcObject = null;
        returnVideo.classList.remove('active');
        returnVideo.muted = false;
        returnPh.classList.remove('hide');
        connected = false;
        micMuted = false;
        cameraMuted = false;
        
        btnMic.className = 'ctrl-btn mic-active';
        svgMicOn.style.display = 'block';
        svgMicMut.style.display = 'none';
        
        btnCamera.classList.remove('muted');
        svgCamOn.style.display = 'block';
        svgCamMut.style.display = 'none';

        updateTopStats(false);
    }

    // ─── CONECTAR ────────────────────────────────────────────────
    function doConnect() {
        startBtn.disabled = true;
        startBtn.innerHTML = '<span class="spinner"></span>Carregando SDK...';
        startInfo.textContent = '';
        startInfo.className = '';

        loadSDK()
        .then(function() {
            startBtn.innerHTML = '<span class="spinner"></span>Acessando câmera...';
            return getMedia();
        })
        .then(function(stream) {
            localStream = stream;
            // Canvas em vez de video (workaround preview preto mobile)
            var hiddenVideo = document.createElement('video');
            hiddenVideo.setAttribute('playsinline', '');
            hiddenVideo.setAttribute('webkit-playsinline', '');
            hiddenVideo.setAttribute('x5-playsinline', '');
            hiddenVideo.autoplay = true;
            hiddenVideo.muted = true;
            hiddenVideo.srcObject = stream;
            hiddenVideo.play().catch(function(){});
            var canvas = document.createElement('canvas');
            canvas.id = 'local-video';
            canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
            var cctx = canvas.getContext('2d');
            window._localMirror = true;
            function renderFrame() {
                if (hiddenVideo.videoWidth && hiddenVideo.videoHeight) {
                    canvas.width = hiddenVideo.videoWidth;
                    canvas.height = hiddenVideo.videoHeight;
                    if (window._localMirror) {
                        cctx.save();
                        cctx.scale(-1, 1);
                        cctx.drawImage(hiddenVideo, -canvas.width, 0, canvas.width, canvas.height);
                        cctx.restore();
                    } else {
                        cctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
                    }
                }
                window._localRaf = requestAnimationFrame(renderFrame);
            }
            hiddenVideo.addEventListener('playing', renderFrame);
            localVideo.replaceWith(canvas);
            localVideo = canvas;
            window._localVideoEl = hiddenVideo;
            window._localCanvasCtx = cctx;
            localPh.classList.add('hide');
            localPh.classList.add('hide');
            startVU(stream);

            startBtn.innerHTML = '<span class="spinner"></span>Conectando...';

            vdo = new VDONinjaSDK({ iceServers: ICE, password: false, salt: 'vdo.ninja' });
            vdo.addEventListener('disconnected', function() {
                if (!connected) return;
                connected = false;
                startOverlay.classList.remove('hide');
                startBtn.disabled = false;
                startBtn.textContent = 'Reconectar';
                startInfo.textContent = '⚠️ Conexão perdida.';
                liveBadge.classList.remove('show');
                stopKbps();
                updateTopStats(false);
            });
            vdo.addEventListener('track', function(event) {
                var streamID = event.detail && event.detail.streamID;
                var track = event.detail && event.detail.track;
                if (streamID !== RETURN_STREAM_ID || !track) return;
                if (!returnStream) {
                    returnStream = new MediaStream();
                    returnVideo.srcObject = returnStream;
                }
                returnStream.addTrack(track);
                if (track.kind === 'video') {
                    returnVideo.srcObject = null;
                    returnVideo.srcObject = returnStream;
                    returnVideo.play().catch(function(){});
                }
                if (track.kind === 'audio' && returnStream.getAudioTracks().length === 1) {
                    startReturnAudio(returnStream);
                }
                returnVideo.classList.add('active');
                returnPh.classList.add('hide');
            });
            return vdo.connect();
        })
        .then(function() {
            startBtn.innerHTML = '<span class="spinner"></span>Entrando na sala...';
            return vdo.joinRoom({ room: ROOM, password: false });
        })
        .then(function() {
            startBtn.innerHTML = '<span class="spinner"></span>Publicando...';
            return vdo.publish(localStream, { streamID: streamID, password: false });
        })
        .then(function() {
            connected = true;
            startOverlay.classList.add('hide');
            liveBadge.classList.add('show');

            updateTopStats(true);
            setTimeout(function() { startViewReturn(); }, 1500);
            setTimeout(function() { startKbps(); }, 4000);
        })
        .catch(function(err) {
            cleanup();
            if (vdo) { try { vdo.disconnect(); } catch(e) {} vdo = null; }
            startBtn.disabled = false;
            startBtn.textContent = 'Tentar Novamente';
            var msg = '❌ ';
            if (err.name === 'NotAllowedError') msg += 'Permissão de câmera negada. Vá em Configurações e permita.';
            else if (err.name === 'NotFoundError') msg += 'Nenhuma câmera encontrada.';
            else if (err.name === 'NotReadableError') msg += 'Câmera em uso por outro aplicativo.';
            else if (err.name === 'SecurityError') msg += 'Requer HTTPS.';
            else msg += (err.message || 'Erro desconhecido');
            startInfo.textContent = msg;
            startInfo.className = 'error';
        });
    }

    // ─── DESCONECTAR ─────────────────────────────────────────────
    function doDisconnect() {
        cleanup();
        if (vdo) { try { vdo.disconnect(); } catch(e) {} vdo = null; }
        startOverlay.classList.remove('hide');
        startBtn.disabled = false;
        startBtn.textContent = 'Iniciar Transmissão';
        startInfo.textContent = '';
        showToast('Transmissão encerrada');
    }

    // ─── EVENTS ──────────────────────────────────────────────────
    startBtn.addEventListener('click', doConnect);

    document.addEventListener('click', function resumeAudio() {
        document.removeEventListener('click', resumeAudio);
        document.removeEventListener('touchstart', resumeAudio);
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function(){});
    });
    document.addEventListener('touchstart', function resumeAudio() {
        document.removeEventListener('click', resumeAudio);
        document.removeEventListener('touchstart', resumeAudio);
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function(){});
    });

    btnHangup.addEventListener('click', function() {
        if (connected) {
            if (confirm('Deseja realmente desligar a transmissão?')) {
                doDisconnect();
            }
        }
    });

    // ─── INIT ─────────────────────────────────────────────────────
    loadSDK().then(function() {
        startBtn.disabled = false;
        startBtn.textContent = 'Iniciar Transmissão';
        startInfo.textContent = 'Toque para ativar sua câmera e microfone.';
    }).catch(function() {
        startBtn.disabled = false;
        startBtn.textContent = 'Iniciar Transmissão';
        startInfo.textContent = 'O SDK carregará ao conectar.';
    });

    window.addEventListener('beforeunload', function(e) {
        if (connected) { e.preventDefault(); e.returnValue = ''; }
    });

})();
</script>
</body>
</html>
