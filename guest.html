<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NossaTV — Convidado</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:12px}
        .card{background:#1a1a2e;border-radius:16px;padding:20px 16px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
        .sub{color:#888;font-size:0.82em;margin-bottom:12px;text-align:center}
        .video-wrap{position:relative;border-radius:10px;overflow:hidden;background:#000;margin-bottom:8px}
        .video-wrap video{width:100%;display:block;border-radius:10px}
        .mic-bar{position:absolute;bottom:8px;left:8px;display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:20px;font-size:0.75em;z-index:2}
        .mic-bar .bars{display:flex;align-items:center;gap:2px;height:16px}
        .mic-bar .bars span{display:block;width:3px;border-radius:2px;background:#4caf50;transition:height .08s;height:2px}
        .return-video{width:100%;border-radius:10px;background:#000;margin-bottom:8px;display:none}
        .return-video.active{display:block}
        .toggle-btn{width:100%;padding:16px;border:none;border-radius:50px;font-size:1.1em;font-weight:700;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}
        .toggle-btn.off{background:#2e7d32;color:#fff}
        .toggle-btn.on{background:#1b5e20;color:#fff}
        .toggle-btn:disabled{opacity:0.5;cursor:not-allowed}
        .toggle-btn .indicator{width:14px;height:14px;border-radius:50%;display:inline-block;transition:all .25s}
        .toggle-btn.off .indicator{background:#81c784;box-shadow:0 0 6px #81c784}
        .toggle-btn.on .indicator{background:#a5d6a7;box-shadow:0 0 6px #a5d6a7}
        .info{font-size:0.75em;color:#666;margin-top:10px;line-height:1.5;text-align:center}
    </style>
</head>
<body>
    <div class="card">
        <p class="sub" id="slot-label">Conectando...</p>
        <div class="video-wrap">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="mic-bar" id="mic-bar">
                <span>🎤</span>
                <div class="bars" id="mic-bars"></div>
            </div>
        </div>
        <video id="return-video" class="return-video" autoplay playsinline></video>
        <button id="btn-toggle" class="toggle-btn off" disabled>
            <span class="indicator"></span>
            <span id="btn-text">Iniciar</span>
        </button>
        <p class="info" id="info-text">Ao conectar, sua câmera e áudio serão enviados para a transmissão ao vivo.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@v1.3.18/vdoninja-sdk.min.js" integrity="sha384-/xDAcwjdhN3g8ilH5vtF0Agq4V9XxMqRwgxde0EVDrfjVJUk87pBL/SgjNUsBFEq" crossorigin="anonymous"></script>
    <script>
    (function() {
        const params = new URLSearchParams(location.search);
        const room = params.get('room') || 'nossatv';
        const slot = params.get('slot');
        if (!slot) {
            document.getElementById('slot-label').textContent = 'Link inválido';
            document.getElementById('btn-toggle').disabled = true;
            document.getElementById('btn-text').textContent = 'Link inválido';
            return;
        }

        const streamID = 'slot_' + slot;
        document.getElementById('slot-label').textContent = 'Convidado: ' + slot;

        let vdo = null;
        let localStream = null;
        let connected = false;
        let micAnalyser = null;
        let micAnimId = null;

        const localVideo = document.getElementById('local-video');
        const returnVideo = document.getElementById('return-video');
        const toggleBtn = document.getElementById('btn-toggle');
        const btnText = document.getElementById('btn-text');
        const infoText = document.getElementById('info-text');
        const micBar = document.getElementById('mic-bar');
        const micBars = document.getElementById('mic-bars');

        const barCount = 12;
        for (let i = 0; i < barCount; i++) {
            const s = document.createElement('span');
            micBars.appendChild(s);
        }

        function startMicMeter(stream) {
            try {
                const ctx = new AudioContext();
                const src = ctx.createMediaStreamSource(stream);
                const analyser = ctx.createAnalyser();
                analyser.fftSize = 64;
                src.connect(analyser);
                micAnalyser = analyser;
                const data = new Uint8Array(analyser.frequencyBinCount);
                const bars = micBars.querySelectorAll('span');
                const draw = () => {
                    analyser.getByteFrequencyData(data);
                    const avg = data.reduce((a, b) => a + b, 0) / data.length;
                    const norm = Math.min(1, avg / 128);
                    const active = Math.round(norm * barCount);
                    bars.forEach((b, j) => {
                        b.style.height = (j < active ? 4 + (norm * 12) : 2) + 'px';
                        b.style.background = j < active ? '#4caf50' : '#333';
                    });
                    micAnimId = requestAnimationFrame(draw);
                };
                draw();
            } catch (e) {
                console.warn('[Guest] Mic meter error:', e);
            }
        }

        function stopMicMeter() {
            if (micAnimId) cancelAnimationFrame(micAnimId);
            micAnimId = null;
            micAnalyser = null;
            micBars.querySelectorAll('span').forEach(s => { s.style.height = '2px'; s.style.background = '#333'; });
        }

        function setToggle(on) {
            toggleBtn.classList.remove('on', 'off');
            toggleBtn.classList.add(on ? 'on' : 'off');
            btnText.textContent = on ? 'Ligado' : 'Desligado';
        }

        function cleanup() {
            stopMicMeter();
            if (vdo) {
                try { if (localStream) vdo.stopPublishing(); } catch(e) {}
                try { vdo.stopViewing('program_' + slot); } catch(e) {}
            }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            localVideo.srcObject = null;
            localVideo.style.display = 'none';
            returnVideo.srcObject = null;
            returnVideo.classList.remove('active');
            connected = false;
        }

        function resetUI() {
            toggleBtn.disabled = false;
            setToggle(false);
            infoText.textContent = 'Ao conectar, sua câmera e áudio serão enviados para a transmissão ao vivo.';
        }

        toggleBtn.addEventListener('click', async () => {
            if (connected) {
                if (vdo && localStream) {
                    try { vdo.stopPublishing(); } catch(e) {}
                    try { vdo.stopViewing('program_' + slot); } catch(e) {}
                }
                cleanup();
                vdo = null;
                resetUI();
                return;
            }

            toggleBtn.disabled = true;
            btnText.textContent = 'Conectando...';
            infoText.textContent = 'Solicitando câmera e microfone...';

            // Timeout de segurança — se demorar mais que 15s, libera o botão
                const timeout = setTimeout(() => {
                    if (!connected) {
                        toggleBtn.disabled = false;
                        resetUI();
                        infoText.textContent = 'Tempo limite excedido. Verifique sua câmera e tente novamente.';
                    }
                }, 20000);

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: true
                });
                clearTimeout(timeout);
                localVideo.srcObject = localStream;
                localVideo.style.display = 'block';
                localVideo.play().catch(() => {});
                startMicMeter(localStream);

                btnText.textContent = 'Conectando...';
                infoText.textContent = 'Conectando ao servidor...';

                vdo = new VDONinjaSDK({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                    ],
                });
                await vdo.connect();
                await vdo.joinRoom({ room: room });
                await vdo.publish(localStream, { streamID: streamID });

                vdo.view('program_' + slot, { audio: true, video: true }).then(stream => {
                    if (stream) {
                        returnVideo.srcObject = stream;
                        returnVideo.classList.add('active');
                        returnVideo.play().catch(() => {});
                    }
                }).catch(() => {});

                setToggle(true);
                connected = true;
                toggleBtn.disabled = false;
                infoText.textContent = 'Conectado — sua câmera está sendo transmitida.';

            } catch (err) {
                clearTimeout(timeout);
                console.error('[Guest] Erro:', err);
                try { if (vdo) { vdo.disconnect(); } } catch(e) {}
                cleanup();
                vdo = null;
                resetUI();
                infoText.textContent = 'Erro: ' + err.message;
                if (err.name === 'NotAllowedError') {
                    infoText.textContent = 'Permissão de câmera negada. Permita o acesso e tente novamente.';
                } else if (err.name === 'NotFoundError') {
                    infoText.textContent = 'Nenhuma câmera encontrada neste dispositivo.';
                }
            }
        });
    })();
    </script>
</body>
</html>
