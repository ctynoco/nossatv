<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Convidado</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:#1a1a2e;border-radius:16px;padding:32px 24px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
        .sub{color:#888;font-size:0.82em;margin-bottom:20px}
        .video-wrap{position:relative;border-radius:8px;overflow:hidden;background:#000;margin-bottom:16px}
        .video-wrap video{width:100%;display:block;border-radius:8px}
        .video-wrap video.hidden{display:none}
        .dot{position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:#555;transition:background .3s;z-index:2}
        .dot.on{background:#4caf50;box-shadow:0 0 6px #4caf50}
        .return-video{width:100%;border-radius:8px;background:#000;margin-bottom:16px;display:none}
        .return-video.active{display:block}
        .btn{width:100%;padding:14px;border:none;border-radius:50px;font-size:1em;font-weight:700;cursor:pointer;transition:opacity .2s}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .btn-primary{background:#1976d2;color:#fff}
        .btn-primary:hover:not(:disabled){background:#1565c0}
        .info{font-size:0.78em;color:#666;margin-top:12px;line-height:1.5}
    </style>
</head>
<body>
    <div class="card">
        <p class="sub" id="slot-label">Conectando...</p>
        <div class="video-wrap">
            <video id="local-video" autoplay playsinline muted class="hidden"></video>
            <div class="dot" id="dot"></div>
        </div>
        <video id="return-video" class="return-video" autoplay playsinline></video>
        <button id="btn-toggle" class="btn btn-primary">Ativar Câmera</button>
        <p class="info" id="info-text">Ao conectar, sua câmera e áudio serão enviados para a transmissão ao vivo.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@v1.3.18/vdoninja-sdk.min.js" integrity="sha384-/xDAcwjdhN3g8ilH5vtF0Agq4V9XxMqRwgxde0EVDrfjVJUk87pBL/SgjNUsBFEq" crossorigin="anonymous"></script>
    <script>
    (function() {
        var params = new URLSearchParams(location.search);
        var room = params.get('room') || 'nossatv';
        var slot = params.get('slot');
        if (!slot) {
            document.getElementById('slot-label').textContent = 'Link inválido';
            document.getElementById('btn-toggle').disabled = true;
            return;
        }

        var streamID = 'slot_' + slot;
        var programID = 'program_' + slot;
        document.getElementById('slot-label').textContent = 'Convidado: ' + slot;

        var vdo = null;
        var localStream = null;
        var connected = false;
        var viewRetry = null;
        var returnStream = null;

        window.addEventListener('beforeunload', function(e) {
            if (connected) { e.preventDefault(); e.returnValue = ''; }
        });

        var localVideo = document.getElementById('local-video');
        var returnVideo = document.getElementById('return-video');
        var toggleBtn = document.getElementById('btn-toggle');
        var infoText = document.getElementById('info-text');
        var dot = document.getElementById('dot');

        function showVideo() {
            localVideo.classList.remove('hidden');
        }

        function hideVideo() {
            localVideo.classList.add('hidden');
        }

        function setDot(on) {
            dot.classList.toggle('on', on);
        }

        function setBtnText(connecting) {
            toggleBtn.textContent = connecting ? 'Conectando...' : (connected ? 'Desativar Câmera' : 'Ativar Câmera');
        }

        function attachReturnStream() {
            if (returnStream && returnStream.active) {
                returnVideo.srcObject = returnStream;
                returnVideo.classList.add('active');
                returnVideo.play().catch(function() {});
                try {
                    var actx = new (window.AudioContext || window.webkitAudioContext)();
                    if (actx.state === 'suspended') actx.resume();
                    var src = actx.createMediaStreamSource(returnStream);
                    var gain = actx.createGain();
                    gain.gain.value = 0.7;
                    src.connect(gain);
                    gain.connect(actx.destination);
                } catch(e) {}
                if (viewRetry) { clearTimeout(viewRetry); viewRetry = null; }
            }
        }

        function onTrack(event) {
            var detail = event.detail;
            if (!detail || detail.streamID !== programID) return;
            var track = detail.track;
            if (!track) return;
            if (!returnStream) returnStream = new MediaStream();
            returnStream.addTrack(track);
            attachReturnStream();
        }

        function startViewReturn() {
            if (viewRetry) { clearTimeout(viewRetry); viewRetry = null; }
            if (!vdo || !connected) return;
            vdo.view(programID, { audio: true, video: true }).then(function(stream) {
                if (stream && stream.active) {
                    returnStream = stream;
                    attachReturnStream();
                } else {
                    viewRetry = setTimeout(startViewReturn, 3000);
                }
            }).catch(function() {
                viewRetry = setTimeout(startViewReturn, 3000);
            });
        }

        function cleanup() {
            if (viewRetry) { clearTimeout(viewRetry); viewRetry = null; }
            if (vdo) {
                try { if (localStream) vdo.stopPublishing(); } catch(e) {}
                try { vdo.stopViewing(programID); } catch(e) {}
            }
            if (localStream) {
                localStream.getTracks().forEach(function(t) { t.stop(); });
                localStream = null;
            }
            localVideo.srcObject = null;
            hideVideo();
            returnVideo.srcObject = null;
            returnVideo.classList.remove('active');
            returnStream = null;
            connected = false;
            setDot(false);
        }

        toggleBtn.addEventListener('click', function() {
            if (connected) {
                if (vdo && localStream) {
                    try { vdo.stopPublishing(); } catch(e) {}
                    try { vdo.stopViewing(programID); } catch(e) {}
                }
                cleanup();
                vdo = null;
                toggleBtn.disabled = false;
                setBtnText(false);
                infoText.textContent = 'Ao conectar, sua câmera e áudio serão enviados para a transmissão ao vivo.';
                return;
            }

            toggleBtn.disabled = true;
            setBtnText(true);
            infoText.textContent = 'Solicitando câmera e microfone...';

            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                audio: true
            }).then(function(stream) {
                localStream = stream;
                localVideo.srcObject = stream;
                showVideo();
                console.log('[Guest] Stream tracks:', stream.getTracks().map(function(t) { return t.kind + ' enabled=' + t.enabled + ' ready=' + t.readyState; }).join(', '));
                toggleBtn.textContent = 'Conectando...';
                infoText.textContent = 'Conectando ao servidor...';

                vdo = new VDONinjaSDK({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                    ],
                });
                vdo.addEventListener('track', onTrack);
                return vdo.connect().then(function() {
                    return vdo.joinRoom({ room: room });
                }).then(function() {
                    return vdo.publish(localStream, { streamID: streamID });
                }).then(function() {
                    console.log('[Guest] Publish success');
                    connected = true;
                    setDot(true);
                    toggleBtn.disabled = false;
                    setBtnText(false);
                    infoText.textContent = 'Conectado à transmissão.';
                    startViewReturn();
                }).catch(function(err) {
                    console.error('[Guest] Connection error:', err);
                    if (localStream) {
                        localStream.getTracks().forEach(function(t) { t.stop(); });
                        localStream = null;
                    }
                    localVideo.srcObject = null;
                    hideVideo();
                    if (vdo) { try { vdo.disconnect(); } catch(e) {} }
                    vdo = null;
                    connected = false;
                    setDot(false);
                    toggleBtn.disabled = false;
                    setBtnText(false);
                    infoText.textContent = 'Erro: ' + err.message;
                    if (err.name === 'NotAllowedError') {
                        infoText.textContent = 'Permissão de câmera negada. Permita o acesso e tente novamente.';
                    } else if (err.name === 'NotFoundError') {
                        infoText.textContent = 'Nenhuma câmera encontrada neste dispositivo.';
                    }
                }).catch(function(err) {
                    console.error('[Guest] getUserMedia error:', err);
                    hideVideo();
                    toggleBtn.disabled = false;
                    setBtnText(false);
                    infoText.textContent = 'Erro: ' + err.message;
                    if (err.name === 'NotAllowedError') {
                        infoText.textContent = 'Permissão de câmera negada. Permita o acesso e tente novamente.';
                    } else if (err.name === 'NotFoundError') {
                        infoText.textContent = 'Nenhuma câmera encontrada neste dispositivo.';
                    }
                });
        });
    })();
    </script>
</body>
</html>
