<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NossaTV - Monitor</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000;overflow:hidden;color:#fff;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif}
        iframe{width:100%;height:100%;border:none;display:block;background:#000}
        .status-bar{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.7);padding:8px 14px;display:flex;align-items:center;gap:10px;z-index:100;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);font-size:13px;opacity:0;transition:opacity .3s}
        .status-bar.show{opacity:1}
        .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;background:#4caf50;box-shadow:0 0 6px #4caf50}
        #status-text{color:#aaa;font-size:13px}
        .info-btn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#888;border:1px solid #333;padding:8px 18px;border-radius:20px;font-size:12px;cursor:pointer;z-index:100;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:color .2s,border-color .2s,opacity .3s;white-space:nowrap;opacity:0;pointer-events:none}
        .info-btn.show{opacity:1;pointer-events:auto}
        .info-btn:hover{color:#fff;border-color:#666}
        .tap-area{position:fixed;inset:0;z-index:50}
        @media(max-width:480px){.status-bar{font-size:12px;padding:6px 10px}.info-btn{font-size:11px;padding:6px 14px}}
    </style>
</head>
<body>
    <iframe id="player" src="https://vdo.ninja/?view=NossaTV_CAM&room=NossaTV&password=false&cleanviewer&cleanoutput&solo&noseek&nohangupbutton&hideheader&nocontrols" allow="autoplay" loading="lazy"></iframe>

    <div class="status-bar" id="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Monitor</span>
    </div>

    <div class="tap-area" id="tap-area"></div>

    <button class="info-btn" id="info-btn">📋 Copiar link do monitor</button>

<script>
(function(){
    var uiVisible = false;
    var statusBar = document.getElementById('status-bar');
    var infoBtn = document.getElementById('info-btn');
    var tapArea = document.getElementById('tap-area');
    var hideTimer = null;

    function showUI() {
        uiVisible = !uiVisible;
        statusBar.classList.toggle('show', uiVisible);
        infoBtn.classList.toggle('show', uiVisible);
        if (uiVisible) {
            clearTimeout(hideTimer);
            hideTimer = setTimeout(function() { uiVisible = false; statusBar.classList.remove('show'); infoBtn.classList.remove('show'); }, 4000);
        }
    }
    tapArea.addEventListener('click', showUI);
    showUI();

    document.getElementById('info-btn').addEventListener('click', function() {
        var link = window.location.href;
        navigator.clipboard.writeText(link).then(function() {
            var btn = document.getElementById('info-btn');
            btn.textContent = '✅ Link copiado!';
            setTimeout(function() { btn.textContent = '📋 Copiar link do monitor'; }, 2000);
        }).catch(function() {
            var ta = document.createElement('textarea');
            ta.value = link;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
        });
    });
})();
</script>
</body>
</html>
